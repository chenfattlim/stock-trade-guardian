<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

        .btn-fetch { background-color: #0f172a; color: white; border: none; padding: 0 15px; border-radius: 6px; cursor: pointer; font-size: 14px; }

        button.btn-main { width: 100%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button.btn-main:hover { background-color: #1d4ed8; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; }
        .status-hold { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-sell { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .status-half { background-color: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .status-info { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        .status-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .details { margin-top: 15px; font-size: 14px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px; line-height: 1.6; color: #475569; }
        .loading { color: #2563eb; font-size: 14px; margin-top: 5px; display: none; }
        /* K線圖容器 */
        #tvchart { width: 100%; height: 300px; margin-top: 20px; display: none; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    </style>
</head>

<div class="container">
    <h2>移動停利監控面板</h2>

    <div class="form-group">
        <label for="stockId">股票代號</label>

        <div id="loadingText" class="loading">正在向 FinMind 撈取近 6 個月歷史資料...</div>
    </div>
    
    <!-- TradingView K線圖容器 -->
    <div id="tvchart"></div>
    <br>

    <div class="form-group">

    <div class="form-group">

    </div>
    
    <button class="btn-main" onclick="checkStatus()">立即分析狀態</button>
    
    <div id="result" class="result-box"></div>
</div>

// 全域變數儲存圖表與蠟燭線，方便後續畫線
let tvChart = null; 
let candlestickSeries = null;
let priceLines = []; 

function loadSavedMaxHigh() {
    const stockId = document.getElementById('stockId').value.trim();
    if(stockId) {
        const savedMax = localStorage.getItem('max_high_6m_' + stockId);
        document.getElementById('maxHighPrice').value = savedMax ? savedMax : '';
    }
}

// 繪製 TradingView K線圖
function renderChart(data) {
    const chartContainer = document.getElementById('tvchart');
    chartContainer.innerHTML = ''; 
    chartContainer.style.display = 'block';

    tvChart = LightweightCharts.createChart(chartContainer, {
        width: chartContainer.clientWidth,
        height: 300,
        layout: { background: { color: '#ffffff' }, textColor: '#333' },
        grid: { vertLines: { color: '#f0f3fa' }, horzLines: { color: '#f0f3fa' } },
        timeScale: { borderColor: '#cccccc' }
    });

    candlestickSeries = tvChart.addCandlestickSeries({
        upColor: '#ef5350',      
        downColor: '#26a69a',    
        borderVisible: false,
        wickUpColor: '#ef5350',
        wickDownColor: '#26a69a',
    });

    candlestickSeries.setData(data);
    tvChart.timeScale().fitContent(); 
    priceLines = []; 
}

// 撈取近 6 個月資料 (FinMind 穩定版)
async function fetchLivePriceAndChart() {
    const stockId = document.getElementById('stockId').value.trim();
    const loadingText = document.getElementById('loadingText');
    if (!stockId) { alert('請先輸入股票代號！'); return; }
    
    loadingText.style.display = 'block';
    
    let livePrice = 0;
    let maxClose = 0;
    let chartData = [];
    
    try {
        const endDate = new Date();
        const startDate = new Date();
        // 往前推 6 個月
        startDate.setMonth(startDate.getMonth() - 6);
        
        const endStr = endDate.toISOString().split('T')[0];
        const startStr = startDate.toISOString().split('T')[0];
        
        const apiUrl = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${stockId}&start_date=${startStr}&end_date=${endStr}`;
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('API 連線失敗');
        
        const data = await response.json();
        
        if (data.msg === 'success' && data.data && data.data.length > 0) {
            const quotes = data.data;
            
            for (let i = 0; i < quotes.length; i++) {
                const daily = quotes[i];
                const closePrice = daily.close;
                maxClose = Math.max(maxClose, closePrice);
                livePrice = closePrice;
                
                chartData.push({
                    time: daily.date,
                    open: daily.open,
                    high: daily.max,
                    low: daily.min,
                    close: daily.close
                });
            }
            
            document.getElementById('currentPrice').value = livePrice.toFixed(2);
            document.getElementById('maxHighPrice').value = maxClose.toFixed(2);
            localStorage.setItem('max_high_6m_' + stockId, maxClose.toFixed(2));
            
            renderChart(chartData);
            alert(`成功載入 K 線圖！\n近六個月最高收盤價：${maxClose.toFixed(2)} 元\n\n💡 點擊下方「立即分析狀態」即可在圖上畫出停利與停損線！`);
            
        } else {
            alert('FinMind 查無此股票資料，請確認股號是否正確。');
        }
    } catch (error) {
        console.error(error);
        alert('系統發生連線錯誤，請確認網路狀態或稍後再試。');
    } finally {
        loadingText.style.display = 'none';
    }
}

// 核心分析邏輯與【動態畫線功能】+【全中文術語】
function checkStatus() {
    const stockId = document.getElementById('stockId').value.trim();
    const currentPrice = parseFloat(document.getElementById('currentPrice').value);
    const maxHighPrice = parseFloat(document.getElementById('maxHighPrice').value);
    
    if (!stockId || isNaN(currentPrice) || isNaN(maxHighPrice)) {
        alert('請先抓取資料或輸入完整的股價資訊！');
        return;
    }
    
    const stock = fiboData[stockId];
    if (!stock) {
        alert('查無此股票代號的回測資料。');
        return;
    }
    
    let currentLvlNum = 0;
    for (let i = 10; i >= 1; i--) {
        if (maxHighPrice >= stock[`fib_lvl_${i}`]) {
            currentLvlNum = i;
            break;
        }
    }
    
    const resultDiv = document.getElementById('result');
    let htmlContent = '';
    let boxClass = '';
    
    // --- 準備防線數值 ---
    const currentFibValue = stock[`fib_lvl_${currentLvlNum}`];
    const currentPltValue = stock[`plt_lvl_${currentLvlNum}`];
    const nextFibValue = stock[`fib_lvl_${currentLvlNum + 1}`] || '無上限';
    
    // --- 在圖表上畫出水平線 ---
    if (candlestickSeries && currentLvlNum > 0) {
        priceLines.forEach(line => candlestickSeries.removePriceLine(line));
        priceLines = [];
        
        // 1. 停損線 (紅線虛線)
        priceLines.push(candlestickSeries.createPriceLine({
            price: currentFibValue, color: '#ef5350', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: `停損 (${currentFibValue})`,
        }));
        
        // 2. 50% 獲利線 (橘色虛線)
        priceLines.push(candlestickSeries.createPriceLine({
            price: currentPltValue, color: '#f59e0b', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: `半數停利 (${currentPltValue})`,
        }));
        
        // 3. 全數獲利線 (綠色虛線)
        if (nextFibValue !== '無上限') {
            priceLines.push(candlestickSeries.createPriceLine({
                price: nextFibValue, color: '#10b981', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: `全數獲利 (${nextFibValue})`,
            }));
        }
    }
    
    if (currentLvlNum === 0) {
        boxClass = 'status-info';
        htmlContent = `
            <div class="status-title">提示：未突破基礎階層</div>
            <div>近六個月最高價 (${maxHighPrice}) 尚未超越第一階費氏線 (${stock.fib_lvl_1})，未啟動停利機制。</div>
        `;
    } else {
        // --- 狀態判斷 (全中文術語版) ---
        if (currentPrice < currentFibValue) {
            boxClass = 'status-sell';
            htmlContent = `
                <div class="status-title">❌ 跌破支撐：停損 / 全數出清</div>
                <div>最新價 <strong>${currentPrice}</strong> 已跌破當前區間防線 <strong>第 ${currentLvlNum} 階費氏支撐 (${currentFibValue})</strong>。<br>
                <br>
                👉 依據策略：<strong>碰到/跌破下方支撐，請執行停損或全數出清，保護資金。</strong></div>
            `;
            
        } else if (maxHighPrice >= currentPltValue) {
            boxClass = 'status-half';
            htmlContent = `
                <div class="status-title">⚠️ 已達平台：獲利了結 50%</div>
                <div>最新價 <strong>${currentPrice}</strong> (波段最高曾達 ${maxHighPrice})。<br>
                已成功站上 3/8 平台 <strong>第 ${currentLvlNum} 階減碼平台 (${currentPltValue})</strong>。<br>
                <br>
                👉 依據策略：<strong>請在此刻獲利了結 50%！</strong><br>
                剩餘部位續抱，目標觸及上方 <strong>下一階費氏目標 (${nextFibValue})</strong> 時【全數獲利】；<br>
                若不幸回檔跌破下方 <strong>第 ${currentLvlNum} 階費氏支撐 (${currentFibValue})</strong> 則【停損出清】。</div>
            `;
            
        } else {
            boxClass = 'status-hold';
            htmlContent = `
                <div class="status-title">🎯 進入新階層：請依策略動作</div>
                <div>最新價 <strong>${currentPrice}</strong> 目前站上 <strong>第 ${currentLvlNum} 階費氏支撐 (${currentFibValue})</strong>。<br>
                <br>
                <strong>【策略執行確認】</strong><br>
                1. 若您是從下方抱上來的：恭喜！碰到更高的階層目標，請<strong>【全數獲利了結】🏆</strong><br>
                2. 若您是剛建倉或已保留部位：請安心續抱。<br>
                <br>
                <strong>【下一步目標】</strong><br>
                • 往上碰到 <strong>第 ${currentLvlNum} 階減碼平台 (${currentPltValue})</strong> 👉 獲利了結 50%<br>
                • 往下碰到 <strong>第 ${currentLvlNum} 階費氏支撐 (${currentFibValue})</strong> 👉 停損出清
                </div>
            `;
        }
    }
    
    htmlContent += `
        <div class="details">
            <strong>個股基準資訊：</strong><br>
            • 波段最低起點: ${stock.close}<br>
            • 當前所屬區間: <strong>第 ${currentLvlNum || 0} 階</strong>
        </div>
    `;
    
    resultDiv.className = `result-box ${boxClass}`;
    resultDiv.innerHTML = htmlContent;
    resultDiv.style.display = 'block';
}
